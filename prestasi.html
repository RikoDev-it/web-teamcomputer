<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestasi - Team Computer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="logo_tc.png" type="image/png"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        'lb-blue': '#3b82f6',
                        'lb-green': '#22c55e',
                        'lb-red': '#ef4444',
                        'brand': { 500: '#3b82f6', 600: '#2563eb', 900: '#1e3a8a' }
                    }
                }
            }
        }
    </script>
    <style>
        .card-zoom { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .card-zoom:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .skeleton-line, .skeleton-circle { background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%); background-size: 200% 100%; animation: skeleton-pulse 1.5s ease-in-out infinite; }
        @keyframes skeleton-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
</head>
<body class="font-sans text-gray-600 bg-gray-50 min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3">
                <div class="leading-tight">
                    <div class="font-bold text-gray-900">Kembali ke Beranda</div>
                </div>
            </a>
            <a href="index.html#prestasi" class="text-sm text-gray-500 hover:text-brand-600">&larr; Kembali ke Prestasi</a>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
        <div class="mb-8">
            <h1 class="text-3xl font-extrabold text-gray-900">
                Prestasi Tahun <span id="display-year" class="text-brand-600"></span>
            </h1>
            <p class="text-gray-500 mt-2">Daftar prestasi Team Computer pada tahun tersebut.</p>
        </div>

        <div id="ach-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Cards injected via JS -->
        </div>
    </main>

    <!-- MODAL PRESTASI (DETAIL) -->
    <div id="modal-prestasi" class="fixed inset-0 z-[70] hidden flex items-center justify-center bg-black/70 p-4" aria-hidden="true">
        <div class="bg-white rounded-2xl max-w-lg w-full shadow-2xl relative" role="dialog" aria-modal="true" aria-labelledby="pr-title">
            <button id="pr-close" class="absolute top-3 right-3 h-10 w-10 rounded-xl grid place-items-center text-white/90 hover:text-white bg-black/30 hover:bg-black/40 transition" aria-label="Tutup">
                <span class="text-2xl leading-none">&times;</span>
            </button>

            <div class="pt-10 pb-2 flex justify-center">
                <img id="pr-img" src="" class="h-32 w-32 rounded-full object-cover border-4 border-white shadow-xl cursor-zoom-in" alt="Foto Pemenang">
            </div>

            <div class="p-6">
                <div class="flex items-start justify-between gap-4">
                    <div class="min-w-0">
                        <h3 id="pr-title" class="text-xl font-extrabold text-gray-900 truncate"></h3>
                        <p id="pr-bidang" class="text-brand-600 font-semibold mt-1"></p>
                    </div>
                    <span id="pr-jurusan" class="shrink-0 text-xs font-bold px-2.5 py-1 rounded-full bg-blue-50 text-brand-600"></span>
                </div>

                <div class="mt-4 text-sm text-gray-600 space-y-2 bg-gray-50 border border-gray-100 rounded-xl p-4">
                    <p>Lokasi: <span id="pr-lokasi" class="font-semibold text-gray-800"></span></p>
                    <p>Angkatan: <span id="pr-angkatan" class="font-semibold text-gray-800"></span></p>
                    <p>Tahun: <span id="pr-tahun" class="font-semibold text-gray-800"></span></p>
                    <p>Peringkat: <span id="pr-peringkat" class="font-semibold text-gray-800"></span></p>
                    <p>Tingkat: <span id="pr-tingkat" class="font-semibold text-gray-800"></span></p>
                </div>

                <div class="mt-6 flex justify-end">
                    <button id="pr-close-2" class="px-5 py-2.5 bg-brand-600 text-white rounded-lg font-medium hover:bg-brand-500 transition shadow-lg shadow-blue-500/20">
                        Tutup
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- FULLSCREEN PHOTO VIEWER (seperti di anggota.html) -->
    <div id="photo-viewer" class="fixed inset-0 z-[80] hidden bg-black bg-opacity-95 flex items-center justify-center p-4">
        <img id="pv-img" class="max-w-full max-h-[90vh] object-contain select-none" alt="Foto Pemenang" draggable="false">
    </div>

    <footer class="bg-white border-t border-gray-200 py-6">
        <div class="text-center text-sm text-gray-500">&copy;2026 Team Computer SMKN 1 LIWA</div>
    </footer>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/prestasi.js"></script>
</body>
</html>
